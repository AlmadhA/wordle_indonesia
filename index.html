<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle Indonesia - Special Edition</title>
    <style>
        :root {
            --color-correct: #6aaa64;
            --color-present: #c9b458;
            --color-absent: #787c7e;
            --color-border: #d3d6da;
            --background: #ffffff;
            --text-color: #000000;
            --gold: #ffd700;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none;
            overflow: hidden;
        }

        /* LIVE GLOBAL LEADERBOARD TOP 10 (TOP RIGHT CORNER) */
        .global-leaderboard {
            position: fixed;
            top: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--gold);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.78rem;
            z-index: 250;
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.2);
            max-width: 220px;
            max-height: 70vh;
            overflow-y: auto;
            color: white;
        }
        .global-leaderboard h3 {
            margin: 0 0 6px 0;
            color: var(--gold);
            font-size: 0.85rem;
            text-align: center;
            letter-spacing: 1px;
            border-bottom: 1px solid #444;
            padding-bottom: 6px;
        }
        .leaderboard-list { list-style: none; margin: 0; padding: 0; }
        .leaderboard-list li {
            display: flex; justify-content: space-between; gap: 8px;
            padding: 3px 0; color: #ddd; white-space: nowrap;
        }
        .leaderboard-list li .rank { color: var(--gold); font-weight: bold; min-width: 20px; }
        .leaderboard-list li .lb-name { flex-grow: 1; overflow: hidden; text-overflow: ellipsis; text-align: left; padding: 0 6px; }
        .leaderboard-list li .lb-score { color: #4cd964; font-weight: bold; }
        .leaderboard-list li.is-you { background: rgba(106,170,100,0.25); border-radius: 4px; }
        .leaderboard-empty { color: #888; text-align: center; padding: 6px 0; font-size: 0.75rem; }
        .leaderboard-error { color: #ff6b6b; text-align: center; padding: 6px 0; font-size: 0.72rem; line-height: 1.3; }

        /* GAME HUB: LIST LINK KE GAME-GAME LAIN (DI BAWAH LEADERBOARD) */
        .game-hub {
            position: fixed;
            top: 175px;
            right: 12px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--gold);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.78rem;
            z-index: 250;
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.2);
            max-width: 220px;
            max-height: 40vh;
            overflow-y: auto;
            color: white;
        }
        .game-hub h3 {
            margin: 0 0 6px 0;
            color: var(--gold);
            font-size: 0.85rem;
            text-align: center;
            letter-spacing: 1px;
            border-bottom: 1px solid #444;
            padding-bottom: 6px;
        }
        .game-hub-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 6px; }
        .game-hub-list li a {
            display: block; text-decoration: none; color: #ddd;
            background: rgba(255,255,255,0.05); padding: 6px 10px; border-radius: 5px;
            transition: background 0.2s, color 0.2s;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .game-hub-list li a:hover { background: rgba(255, 215, 0, 0.15); color: var(--gold); }
        .game-hub-list li a.active-page {
            background: rgba(255, 215, 0, 0.25); color: var(--gold);
            font-weight: bold; pointer-events: none;
        }

        /* SCREEN 1: WELCOME POPUP */
        #welcome-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #121213;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .welcome-box {
            text-align: center;
            background: #1a1a1a;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        .welcome-box h1 { margin-bottom: 10px; color: var(--color-correct); }
        .welcome-box p { font-size: 1.2rem; margin-bottom: 30px; }

        .input-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 20px; text-align: left; }
        .input-group label { font-size: 0.85rem; color: #aaa; font-weight: bold; }
        .input-group input[type="text"] {
            padding: 10px; background: #2a2a2a; color: white;
            border: 1px solid #444; border-radius: 5px; font-size: 1rem; outline: none;
        }

        .btn-choice {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 0 10px;
            transition: transform 0.1s;
        }
        .btn-choice:active { transform: scale(0.95); }
        #btn-yes { background-color: var(--color-correct); color: white; }
        #btn-no { background-color: #e03c3c; color: white; }

        /* SCREEN 2: GAME WORDLE */
        #main-game {
            display: none; /* Appears after clicking Yes */
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        header {
            border-bottom: 1px solid var(--color-border);
            width: 100%;
            text-align: center;
            padding: 10px 0;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        #game-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            max-width: 500px;
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        #board {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            grid-gap: 5px;
            padding: 10px;
            margin-bottom: 15px;
        }

        .row { display: grid; grid-template-columns: repeat(5, 1fr); grid-gap: 5px; }

        .tile {
            width: 52px; height: 52px;
            border: 2px solid var(--color-border);
            display: inline-flex; justify-content: center; align-items: center;
            font-size: 1.8rem; font-weight: bold; text-transform: uppercase;
            box-sizing: border-box; transition: background-color 0.3s, border-color 0.3s;
        }

        .tile[data-state="correct"] { background-color: var(--color-correct); border-color: var(--color-correct); color: white; }
        .tile[data-state="present"] { background-color: var(--color-present); border-color: var(--color-present); color: white; }
        .tile[data-state="absent"] { background-color: var(--color-absent); border-color: var(--color-absent); color: white; }

        #keyboard { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 6px; }
        .key-row { display: flex; justify-content: center; gap: 5px; width: 100%; }
        
        .key {
            background-color: #e5e5e5; border: 0; padding: 0; height: 55px;
            flex-grow: 1; border-radius: 4px; cursor: pointer;
            font-weight: bold; font-size: 1.1rem; display: flex;
            justify-content: center; align-items: center; text-transform: uppercase;
        }
        .key.wide { flex-grow: 1.5; font-size: 0.85rem; }

        #reset-btn {
            margin-top: 15px; background-color: #2196F3; color: white;
            border: none; padding: 10px 25px; font-size: 0.95rem;
            font-weight: bold; border-radius: 4px; cursor: pointer;
            transition: background-color 0.2s;
        }
        #reset-btn:hover { background-color: #1976D2; }

        #message {
            position: absolute; top: 12%; background-color: #333; color: white;
            padding: 10px 20px; border-radius: 5px; font-weight: bold;
            z-index: 10; opacity: 0; transition: opacity 0.2s ease-in-out; pointer-events: none;
        }
    </style>
</head>

            "TANAM", "TANDA", "TANDU", "TANYA", "TAPAK", "TARIF", "TARIK", "TARUH",
            "TATAP", "TAWAR", "TEBAK", "TEBAL", "TEDUH", "TEGAK", "TEGAS", "TEGUH",
            "TEGUK", "TEKAD", "TEKAN", "TEKUN", "TELUK", "TELUR", "TEMAN", "TENTU",
            "TENUN", "TEORI", "TEPAT", "TEPUK", "TERAS", "TERUS", "TETAP", "TETAS",
            "TEWAS", "TIDAK", "TIDUR", "TIKAM", "TIKUS", "TIMBA", "TIMUR", "TINJU",
            "TINTA", "TIRAI", "TITEL", "TITIK", "TOKOH", "TOLAK", "TOPIK", "TROFI",
            "TUBUH", "TUDUH", "TUGAS", "TUKAR", "TULAR", "TULIS", "TUNAI", "TUNAS",
            "TURUN", "TUSUK", "TUTUP", "UDARA", "UJANG", "UJIAN", "UJUNG", "ULAMA",
            "ULANG", "ULTAH", "UMBAR", "UMPAN", "UMPAT", "UMRAH", "UNDUR", "UNTAI",
            "URUNG", "USAHA", "USANG", "USUNG", "UTAMA", "UTANG", "UTARA", "VONIS",
            "WABAH", "WADUK", "WAJAH", "WAJAR", "WAJIB", "WAKAF", "WAKTU", "WALAU",
            "WANGI", "WARGA", "WARIS", "WARNA", "WARTA", "WASIT", "WAWAS", "WUJUD",
            "YAKIN", "YATIM", "ZABUR", "ZAKAT", "ZALIM", "ZAMAN", "ZIKIR", "AJAIB",
            "AKBAR", "AKRAB", "ALAMI", "BIASA", "PENUH", "ACUAN", "AGUNG", "ANYIR",
            "BAKAL", "BEBEK", "BUBUH", "BUSUR", "CELUP", "CEPER", "CICAK", "DALIH",
            "DESIR", "DIPAN", "DONOR", "ERANG", "EROSI", "FAJAR", "FAUNA", "FLORA",
            "FRASA", "GADAI", "GASAK", "GAUNG", "GAYUT", "GETAR", "GETIR", "GILAS",
            "GORES", "GUGUS", "GULAT", "GUMUL", "HIRAU", "HUNUS", "INCAR", "INTAI",
            "JALIN", "JAMAH", "JEJAK", "JUBAH", "JUDES", "JUMPA", "KAGET", "KARIB"
        ];
        
        let secretWord = "";
        let currentRow = 0;
        let currentTile = 0;
        let gameOver = false;

        const board = document.getElementById("board");
        const keyboard = document.getElementById("keyboard");
        const messageEl = document.getElementById("message");

        // LOAD TOP 10 LEADERBOARD DATA WHEN PAGE FIRST OPENS
        window.addEventListener("DOMContentLoaded", () => {
            ambilTopSkorGlobal();
        });

        // =====================================================================
        // LEADERBOARD TOP 10
        // =====================================================================
        async function ambilTopSkorGlobal() {
            const listEl = document.getElementById("leaderboard-list");
            try {
                const { data, error } = await supabaseClient
                    .from(LEADERBOARD_TABLE)
                    .select('name, score')
                    .order('score', { ascending: false })
                    .limit(10);

                if (error) throw error;

                cachedLeaderboard = data || [];
                renderLeaderboard();
            } catch (err) {
                console.error("Failed to pull Leaderboard data:", err.message);
                listEl.innerHTML = `<li class="leaderboard-error">Failed to load: ${err.message}</li>`;
            }
        }

        function renderLeaderboard() {
            const listEl = document.getElementById("leaderboard-list");

            if (!cachedLeaderboard || cachedLeaderboard.length === 0) {
                listEl.innerHTML = `<li class="leaderboard-empty">No data yet</li>`;
                return;
            }

            listEl.innerHTML = cachedLeaderboard.map((row, i) => {
                const isYou = row.name === currentPlayerName ? "is-you" : "";
                const scoreVal = parseFloat(row.score);
                return `<li class="${isYou}">
                            <span class="rank">#${i + 1}</span>
                            <span class="lb-name">${escapeHtml(row.name)}</span>
                            <span class="lb-score">${scoreVal} pts</span>
                        </li>`;
            }).join("");
        }

        // Simple sanitization so player names don't break the HTML
        function escapeHtml(str) {
            const div = document.createElement("div");
            div.textContent = str;
            return div.innerHTML;
        }

        async function tambahkanSkorGlobal(pointsEarned) {
            try {
                // 1. Cek apakah nama ini sudah ada skornya di database
                const { data: existing, error: fetchError } = await supabaseClient
                    .from(LEADERBOARD_TABLE)
                    .select('name, score')
                    .eq('name', currentPlayerName)
                    .maybeSingle();

                if (fetchError) throw fetchError;

                let newTotalScore;

                if (existing) {
                    // 2a. Nama sudah ada -> tambahkan poin baru ke skor lama (UPDATE)
                    newTotalScore = parseFloat(existing.score) + pointsEarned;
                    const { error: updateError } = await supabaseClient
                        .from(LEADERBOARD_TABLE)
                        .update({ score: newTotalScore })
                        .eq('name', currentPlayerName);

                    if (updateError) throw updateError;
                } else {
                    // 2b. Nama belum ada -> buat baris baru (INSERT)
                    newTotalScore = pointsEarned;
                    const { error: insertError } = await supabaseClient
                        .from(LEADERBOARD_TABLE)
                        .insert([{ name: currentPlayerName, score: newTotalScore }]);

                    if (insertError) throw insertError;
                }

                // Cek apakah skor total ini masuk Top 10 saat ini (berdasarkan cache lokal)
                let lowestInTop10 = cachedLeaderboard.length >= 10
                    ? parseFloat(cachedLeaderboard[cachedLeaderboard.length - 1].score)
                    : -1;
                let masukTop10 = cachedLeaderboard.length < 10 || newTotalScore > lowestInTop10;

                if (masukTop10) {
                    alert(`🏆 +${pointsEarned} points! ${currentPlayerName} now has a total score of ${newTotalScore} and is on the TOP 10 LEADERBOARD!`);
                } else {
                    alert(`+${pointsEarned} points! ${currentPlayerName}'s total score is now ${newTotalScore}.`);
                }

                await ambilTopSkorGlobal(); // Refresh tampilan leaderboard top 10
            } catch (err) {
                console.error("Failed to update score data:", err.message);
                alert(`Failed to save your score: ${err.message}`);
            }
        }

        // FUNGSI SCREEN 1
        function startGame() {
            let nameInput = document.getElementById("player-name-input").value.trim();
            if (!nameInput) {
                alert("Please enter your name before starting!");
                return;
            }
            currentPlayerName = nameInput;

            document.getElementById("welcome-overlay").style.display = "none";
            document.getElementById("main-game").style.display = "flex";
            initGame();
        }

        function closePage() {
            // Modern browsers block window.close() unless the tab was opened via script.
            // Instead, we change the page into a clean rejection message.
            document.getElementById("welcome-overlay").innerHTML = `
                <div class="welcome-box">
                    <h2 style="color:#e03c3c;">Access Denied</h2>
                    <p>Page closed because you're not mentally ready yet. Please come back another time.</p>
                </div>`;
        }

        // INIT GAME LOGIC
        function initGame() {
            secretWord = WORD_LIST[Math.floor(Math.random() * WORD_LIST.length)].toUpperCase();
            board.innerHTML = "";
            keyboard.innerHTML = "";

            // Generate Board
            for (let i = 0; i < 6; i++) {
                const row = document.createElement("div");
                row.className = "row";
                for (let j = 0; j < 5; j++) {
                    const tile = document.createElement("div");
                    tile.className = "tile";
                    row.appendChild(tile);
                }
                board.appendChild(row);
            }

            // Generate Keyboard
            const keys = [
                ["Q", "W", "E", "R", "T", "Y", "U", "I", "O", "P"],
                ["A", "S", "D", "F", "G", "H", "J", "K", "L"],
                ["ENTER", "Z", "X", "C", "V", "B", "N", "M", "DELETE"]
            ];

            keys.forEach(row => {
                const keyRow = document.createElement("div");
                keyRow.className = "key-row";
                row.forEach(key => {
                    const button = document.createElement("button");
                    button.textContent = key;
                    button.className = "key";
                    if (key === "ENTER" || key === "DELETE") button.classList.add("wide");
                    button.addEventListener("click", () => handleInput(key));
                    keyRow.appendChild(button);
                });
                keyboard.appendChild(keyRow);
            });
        }

        // HANDLE INPUT
        function handleInput(key) {
            if (gameOver) return;

            const rows = board.getElementsByClassName("row");
            const tiles = rows[currentRow].getElementsByClassName("tile");

            if (key === "DELETE" || key === "Backspace") {
                if (currentTile > 0) {
                    currentTile--;
                    tiles[currentTile].textContent = "";
                }
            } else if (key === "ENTER" || key === "Enter") {
                if (currentTile === 5) {
                    checkWord(tiles);
                } else {
                    showMessage("Not enough letters!");
                }
            } else if (/^[a-zA-Z]$/.test(key)) {
                if (currentTile < 5) {
                    tiles[currentTile].textContent = key.toUpperCase();
                    currentTile++;
                }
            }
        }

        window.addEventListener("keydown", (e) => handleInput(e.key));

        // CHECK WORD LOGIC
        function checkWord(tiles) {
            let guess = "";
            for (let i = 0; i < 5; i++) { guess += tiles[i].textContent; }

            let target = secretWord;
            
            for (let i = 0; i < 5; i++) {
                let letter = guess[i];
                if (target[i] === letter) {
                    tiles[i].setAttribute("data-state", "correct");
                } else if (target.includes(letter)) {
                    tiles[i].setAttribute("data-state", "present");
                } else {
                    tiles[i].setAttribute("data-state", "absent");
                }
            }

            if (guess === secretWord) {
                gameOver = true;
                // Skor poin tetap berdasarkan percobaan ke berapa pemain menang.
                // currentRow 0-5 (0 = row pertama/percobaan ke-1, 5 = row terakhir/percobaan ke-6)
                // Percobaan 1 = 60pt, 2 = 50pt, 3 = 40pt, 4 = 30pt, 5 = 20pt, 6 = 10pt
                let attemptsUsed = currentRow + 1; // 1 sampai 6
                let pointsEarned = (7 - attemptsUsed) * 10; // 60..10
                showMessage("You Win! 🎉");
                tambahkanSkorGlobal(pointsEarned);
                return;
            }

            // JIKA KALAH (MENCAPAI ROW KE-6)
            if (currentRow === 5) {
                gameOver = true;
                // Kalah = tidak ada poin ditambahkan, langsung kembali ke awal
                backToStart();
                return;
            }

            currentRow++;
            currentTile = 0;
        }

	// KALAH: TAMPILKAN JAWABAN SEBENTAR, LALU KEMBALI KE WELCOME SCREEN DARI AWAL
        function backToStart() {
            showMessage(`Game Over! The word was: ${secretWord}`);

            setTimeout(() => {
                // Sembunyikan game, tampilkan welcome screen lagi
                document.getElementById("main-game").style.display = "none";
                document.getElementById("welcome-overlay").style.display = "flex";
                document.getElementById("player-name-input").value = "";

                // Reset state permainan supaya bersih untuk sesi berikutnya
                currentRow = 0;
                currentTile = 0;
                gameOver = false;
            }, 2000);
        }

        function resetGame() {
            currentRow = 0;
            currentTile = 0;
            gameOver = false;
            initGame();
            showMessage("Game Restart! Good Luck! 🚀");
        }

        function showMessage(msg) {
            messageEl.textContent = msg;
            messageEl.style.opacity = 1;
            setTimeout(() => messageEl.style.opacity = 0, 2500);
        }
    </script>
</body>
